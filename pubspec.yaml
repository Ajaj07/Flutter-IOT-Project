name: environmental_control_app
description: Flutter IoT Environmental Control App for NodeMCU
version: 1.0.0+1

environment:
  sdk: '>=3.8.0 <4.0.0'
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter
  provider: ^6.0.5
  http: ^1.1.0
  shared_preferences: ^2.2.2
  fl_chart: ^0.63.0
  wifi_iot: ^0.3.18
  connectivity_plus: ^4.0.2
  flutter_local_notifications: ^17.1.2
  json_annotation: ^4.9.0
  permission_handler: ^11.3.1
  intl: ^0.18.1
  flutter_svg: ^2.0.7
  crypto: ^3.0.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  mockito: ^5.4.2
  build_runner: ^2.4.7
  json_serializable: ^6.7.1
  flutter_lints: ^2.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/icons/
